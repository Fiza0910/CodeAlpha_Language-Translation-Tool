<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Language Translation Tool</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <h1>Language Translation Tool</h1>
      <section class="card">
        <label for="sourceText">Text to translate</label>
        <textarea
          id="sourceText"
          rows="6"
          placeholder="Enter text here..."
        ></textarea>

        <div class="row">
          <div class="field">
            <label for="sourceLang">Source language</label>
            <select id="sourceLang">
              <option value="">Auto detect</option>
              <option value="en">English</option>
              <option value="es">Spanish</option>
              <option value="fr">French</option>
              <option value="de">German</option>
              <option value="hi">Hindi</option>
              <option value="zh-Hans">Chinese (Simplified)</option>
            </select>
          </div>
          <div class="field">
            <label for="targetLang">Target language</label>
            <select id="targetLang">
              <option value="es">Spanish</option>
              <option value="en">English</option>
              <option value="fr">French</option>
              <option value="de">German</option>
              <option value="hi">Hindi</option>
              <option value="zh-Hans">Chinese (Simplified)</option>
              <option value="ja">Japanese</option>
            </select>
          </div>
        </div>

        <button id="translateButton" class="primary">Translate</button>

        <div id="feedback" class="feedback" aria-live="polite"></div>

        <label for="translatedText">Translated text</label>
        <textarea
          id="translatedText"
          rows="6"
          readonly
          placeholder="Translation appears here..."
        ></textarea>

        <div class="actions">
          <button id="copyButton">Copy</button>
          <button id="speakButton">Speak</button>
        </div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
